name: Fundamental Discovery To Manager

on:
  workflow_dispatch:
    inputs:
      max_universe:
        description: "Maximum symbols to analyze from NASDAQ/S&P 500 universe"
        required: false
        default: "250"
      top_n:
        description: "Number of fundamentally strong stocks to send to Manager_Agent"
        required: false
        default: "10"
  schedule:
    # Run every day at 09:00 Thailand time (02:00 UTC)
    - cron: "0 2 * * *"

jobs:
  fundamental-discovery-to-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Scanner_Agent
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas lxml html5lib requests

      - name: Discover fundamentally strong stocks and send to Manager_Agent
        env:
          MAX_UNIVERSE: ${{ github.event.inputs.max_universe || '250' }}
          TOP_N: ${{ github.event.inputs.top_n || '10' }}
          MANAGER_ANALYZE_MULTI_URL: ${{ secrets.MANAGER_ANALYZE_MULTI_URL }}
          MANAGER_API_KEY: ${{ secrets.MANAGER_API_KEY }}
        run: |
          mkdir -p reports

          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          import urllib.error
          from datetime import datetime, timezone
          from pathlib import Path

          from app.universe import load_sp500_symbols, load_nasdaq100_symbols, load_nasdaq_listed_symbols, normalize_symbols
          from app.data_sources.financial_statements import get_financials
          from app.data_sources.market_data import get_market_data
          from app.analyzers import quality_analyzer, growth_analyzer, valuation_analyzer
          from app.scoring import fundamental_score

          MAX_UNIVERSE = int(os.getenv("MAX_UNIVERSE", "250"))
          TOP_N = int(os.getenv("TOP_N", "10"))
          MANAGER_ANALYZE_MULTI_URL = os.getenv("MANAGER_ANALYZE_MULTI_URL", "").strip()
          MANAGER_API_KEY = os.getenv("MANAGER_API_KEY", "").strip()

          generated_at = datetime.now(timezone.utc).isoformat()

          def safe_float(value):
              try:
                  if value is None:
                      return None
                  return float(value)
              except Exception:
                  return None

          def analyze_symbol(symbol):
              financials = get_financials(symbol, "NASDAQ")
              market = get_market_data(symbol, "NASDAQ")
              if not financials:
                  raise ValueError("missing financial statements")
              if not market:
                  raise ValueError("missing market data")

              quality_metrics = {
                  "roe": quality_analyzer.calculate_roe(financials),
                  "roa": quality_analyzer.calculate_roa(financials),
                  "debt_to_equity": quality_analyzer.calculate_debt_to_equity(financials),
                  "free_cash_flow": quality_analyzer.calculate_free_cash_flow(financials),
                  "profit_margins": quality_analyzer.calculate_profit_margins(financials),
              }
              growth_metrics = {
                  "revenue_cagr": growth_analyzer.calculate_revenue_cagr(financials),
                  "eps_growth": growth_analyzer.calculate_eps_growth(financials),
              }
              valuation_metrics = {
                  "pe_ratio": valuation_analyzer.get_pe_ratio(market),
                  "peg_ratio": valuation_analyzer.get_peg_ratio(market),
                  "pb_ratio": valuation_analyzer.get_pb_ratio(market),
              }

              quality_score = fundamental_score.calculate_quality_score(quality_metrics)
              growth_score = fundamental_score.calculate_growth_score(growth_metrics)
              valuation_score = fundamental_score.calculate_valuation_score(valuation_metrics)
              final_score = fundamental_score.calculate_fundamental_score({
                  "quality_score": quality_score,
                  "growth_score": growth_score,
                  "valuation_score": valuation_score,
              })
              if final_score is None:
                  raise ValueError("final fundamental score is unavailable")

              return {
                  "symbol": symbol,
                  "fundamental_score": round(float(final_score), 2),
                  "grade": fundamental_score.get_grade(final_score),
                  "quality_score": round(float(quality_score), 2) if quality_score is not None else None,
                  "growth_score": round(float(growth_score), 2) if growth_score is not None else None,
                  "valuation_score": round(float(valuation_score), 2) if valuation_score is not None else None,
                  "roe": safe_float(quality_metrics.get("roe")),
                  "roa": safe_float(quality_metrics.get("roa")),
                  "debt_to_equity": safe_float(quality_metrics.get("debt_to_equity")),
                  "free_cash_flow": safe_float(quality_metrics.get("free_cash_flow")),
                  "profit_margins": safe_float(quality_metrics.get("profit_margins")),
                  "revenue_cagr": safe_float(growth_metrics.get("revenue_cagr")),
                  "eps_growth": safe_float(growth_metrics.get("eps_growth")),
                  "pe_ratio": safe_float(valuation_metrics.get("pe_ratio")),
                  "peg_ratio": safe_float(valuation_metrics.get("peg_ratio")),
                  "pb_ratio": safe_float(valuation_metrics.get("pb_ratio")),
                  "market_cap": market.get("marketCap"),
                  "sector": market.get("sector"),
                  "industry": market.get("industry"),
                  "thesis": (
                      f"{symbol} has quality score {quality_score:.2f}, growth score {growth_score:.2f}, "
                      f"and valuation score {valuation_score:.2f}."
                  ),
              }

          sp500 = load_sp500_symbols()
          nasdaq100 = load_nasdaq100_symbols()
          nasdaq_listed = load_nasdaq_listed_symbols()

          # Priority: S&P 500 + Nasdaq-100 first, then broaden into NASDAQ listed symbols.
          universe = normalize_symbols(sp500 + nasdaq100 + nasdaq_listed)
          universe = universe[:MAX_UNIVERSE]

          candidates = []
          errors = []

          for index, symbol in enumerate(universe, start=1):
              try:
                  result = analyze_symbol(symbol)
                  candidates.append(result)
                  print(f"[{index}/{len(universe)}] OK {symbol} score={result['fundamental_score']}")
              except Exception as exc:
                  errors.append({"symbol": symbol, "error": str(exc)})
                  print(f"[{index}/{len(universe)}] SKIP {symbol}: {exc}")

          candidates.sort(
              key=lambda row: (
                  row.get("fundamental_score") or 0,
                  row.get("quality_score") or 0,
                  row.get("growth_score") or 0,
                  row.get("valuation_score") or 0,
              ),
              reverse=True,
          )
          top_candidates = candidates[:TOP_N]
          top_symbols = [row["symbol"] for row in top_candidates]

          manager_payload = {
              "tickers": top_symbols,
              "account_id": 1,
              "source": "Scanner_Agent.fundamental_discovery",
              "metadata": {
                  "generated_at": generated_at,
                  "universe_size": len(universe),
                  "analyzed_count": len(candidates),
                  "error_count": len(errors),
                  "top_n": TOP_N,
              },
          }

          manager_response = None
          manager_status = "not_configured"
          if MANAGER_ANALYZE_MULTI_URL and top_symbols:
              headers = {"Content-Type": "application/json"}
              if MANAGER_API_KEY:
                  headers["X-API-Key"] = MANAGER_API_KEY
              req = urllib.request.Request(
                  MANAGER_ANALYZE_MULTI_URL,
                  data=json.dumps(manager_payload).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req, timeout=300) as resp:
                      manager_response = json.loads(resp.read().decode("utf-8"))
                      manager_status = "sent"
              except urllib.error.HTTPError as exc:
                  manager_status = "http_error"
                  manager_response = {"status_code": exc.code, "body": exc.read().decode("utf-8")}
              except Exception as exc:
                  manager_status = "error"
                  manager_response = {"error": str(exc)}

          report = {
              "generated_at": generated_at,
              "universe_sources": {
                  "sp500_count": len(sp500),
                  "nasdaq100_count": len(nasdaq100),
                  "nasdaq_listed_count": len(nasdaq_listed),
              },
              "max_universe": MAX_UNIVERSE,
              "universe_size": len(universe),
              "analyzed_count": len(candidates),
              "error_count": len(errors),
              "top_n": TOP_N,
              "top_symbols": top_symbols,
              "top_candidates": top_candidates,
              "manager_status": manager_status,
              "manager_payload": manager_payload,
              "manager_response": manager_response,
              "sample_errors": errors[:50],
          }

          Path("reports/fundamental-discovery-to-manager.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2, default=str),
              encoding="utf-8",
          )

          lines = []
          lines.append("# Fundamental Discovery To Manager")
          lines.append("")
          lines.append(f"Generated at UTC: `{generated_at}`")
          lines.append("")
          lines.append("## Universe")
          lines.append(f"- S&P 500 symbols loaded: {len(sp500)}")
          lines.append(f"- Nasdaq-100 symbols loaded: {len(nasdaq100)}")
          lines.append(f"- NASDAQ listed symbols loaded: {len(nasdaq_listed)}")
          lines.append(f"- Symbols analyzed limit: {MAX_UNIVERSE}")
          lines.append(f"- Successfully analyzed: {len(candidates)}")
          lines.append(f"- Errors: {len(errors)}")
          lines.append("")
          lines.append("## Top Fundamental Candidates")
          lines.append("| Rank | Symbol | Grade | Final | Quality | Growth | Valuation | ROE | PE | PEG | PB | Sector |")
          lines.append("|---:|---|---|---:|---:|---:|---:|---:|---:|---:|---:|---|")
          for rank, row in enumerate(top_candidates, start=1):
              lines.append(
                  f"| {rank} | {row['symbol']} | {row['grade']} | {row['fundamental_score']} | "
                  f"{row['quality_score']} | {row['growth_score']} | {row['valuation_score']} | "
                  f"{row.get('roe')} | {row.get('pe_ratio')} | {row.get('peg_ratio')} | {row.get('pb_ratio')} | {row.get('sector') or '-'} |"
              )
          lines.append("")
          lines.append("## Manager Handoff")
          lines.append(f"- Status: `{manager_status}`")
          lines.append(f"- Tickers sent: {', '.join(top_symbols) if top_symbols else '-'}")
          if manager_status == "not_configured":
              lines.append("- MANAGER_ANALYZE_MULTI_URL secret is not configured, so this run only generated the Manager payload.")
          lines.append("")
          lines.append("## Sample Errors")
          if errors:
              for error in errors[:20]:
                  lines.append(f"- {error['symbol']}: {error['error']}")
          else:
              lines.append("- None")

          Path("reports/fundamental-discovery-to-manager.md").write_text(
              "\n".join(lines),
              encoding="utf-8",
          )

          print("\n".join(lines))

          if not top_symbols:
              print("No top fundamental candidates found.", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload fundamental discovery report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fundamental-discovery-to-manager-report
          path: reports/
          if-no-files-found: warn
